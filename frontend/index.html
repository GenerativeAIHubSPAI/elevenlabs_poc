<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      width: 100%;
      max-width: 760px;
      padding: 24px 24px 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: #666;
      text-align: center;
    }

    .tabs {
      display: flex;
      gap: 4px;
      background: #1a1a1a;
      border-radius: 10px;
      padding: 4px;
    }

    .tab-btn {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: #666;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .tab-btn.active { background: #2a2a2a; color: #e0e0e0; }

    main {
      width: 100%;
      max-width: 760px;
      flex: 1;
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
    }

    .tab-panel { display: none; flex: 1; flex-direction: column; }
    .tab-panel.active { display: flex; }

    /* ── Chat ── */
    #chat-log {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      background: #1a1a1a;
      border-radius: 16px;
      min-height: 400px;
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .msg.user      { align-self: flex-end; background: #2563eb; color: #fff; }
    .msg.assistant { align-self: flex-start; background: #2a2a2a; color: #e0e0e0; }
    .msg.error     { align-self: center; color: #ef4444; font-size: 0.8rem; font-style: italic; }

    /* ── Live panel ── */
    #live-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      position: relative;
      border-radius: 20px;
      overflow: hidden;
    }

    /* Fondo degradado que pulsa */
    #live-bg {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: radial-gradient(ellipse at 50% 70%, #0d1f4a 0%, #0a0a0a 70%);
      transition: opacity 0.4s;
    }

    /* Canvas de la onda */
    #wave-canvas {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 240px;
    }

    #live-label {
      position: relative;
      z-index: 1;
      font-size: 0.78rem;
      color: #334;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 24px;
    }

    /* ── Botón minimalista ── */
    .controls {
      padding: 0 0 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #toggle-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border: 1px solid #2a2a2a;
      border-radius: 999px;
      background: #1a1a1a;
      color: #888;
      font-size: 0.82rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      letter-spacing: 0.03em;
    }

    #toggle-btn:hover { border-color: #444; color: #ccc; }

    #toggle-btn .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #444;
      transition: background 0.2s, box-shadow 0.2s;
      flex-shrink: 0;
    }

    #toggle-btn.active     .dot { background: #16a34a; box-shadow: 0 0 6px #16a34a; }
    #toggle-btn.speaking   .dot { background: #dc2626; box-shadow: 0 0 6px #dc2626; }
    #toggle-btn.processing .dot { background: #d97706; box-shadow: 0 0 6px #d97706; }
    #toggle-btn.active     { border-color: #1e3a1e; color: #aaa; }
    #toggle-btn.speaking   { border-color: #3a1e1e; color: #aaa; }
    #toggle-btn.processing { border-color: #3a2e1e; color: #aaa; cursor: not-allowed; }
    #toggle-btn.replying   .dot { background: #a855f7; box-shadow: 0 0 6px #a855f7; }
    #toggle-btn.replying   { border-color: #2e1a4a; color: #aaa; cursor: not-allowed; }

    #status-text {
      font-size: 0.75rem;
      color: #444;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

  <header>
    <h1>Voice Assistant</h1>
    <div class="tabs">
      <button class="tab-btn active" data-tab="live">Live</button>
      <button class="tab-btn" data-tab="chat">Chat</button>
    </div>
  </header>

  <main>
    <div class="tab-panel active" id="tab-live">
      <div id="live-panel">
        <div id="live-bg"></div>
        <canvas id="wave-canvas"></canvas>
        <span id="live-label">en espera</span>
      </div>
    </div>

    <div class="tab-panel" id="tab-chat">
      <div id="chat-log"></div>
    </div>
  </main>

  <div class="controls">
    <button id="toggle-btn">
      <span class="dot"></span>
      <span id="btn-label">Iniciar</span>
    </button>
    <span id="status-text">Pulsa para comenzar</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.14.0/dist/ort.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.19/dist/bundle.min.js"></script>
  <script>
    ort.env.wasm.wasmPaths = "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.14.0/dist/";
  </script>

  <script>
    const ORCHESTRATOR_URL = "http://localhost:8000/orchestrate";

    const toggleBtn  = document.getElementById("toggle-btn");
    const btnLabel   = document.getElementById("btn-label");
    const statusText = document.getElementById("status-text");
    const liveLabel  = document.getElementById("live-label");
    const chatLog    = document.getElementById("chat-log");
    const liveBg     = document.getElementById("live-bg");
    const waveCanvas = document.getElementById("wave-canvas");
    const wCtx       = waveCanvas.getContext("2d");

    let vadInstance  = null;
    let isActive     = false;
    let isProcessing = false;
    let isSpeaking   = false;
    let analyser     = null;
    let micCtx       = null;
    let rafId        = null;
    let smoothedVol  = 0;

    // Colores por estado
    const COLORS = {
      idle:       { bg: "#0d1f4a", wave: "#1e3a8a", glow: "37,99,235"  },
      speaking:   { bg: "#3b0f0f", wave: "#ef4444", glow: "220,38,38"  },
      processing: { bg: "#2a1a00", wave: "#f59e0b", glow: "217,119,6"  },
      replying:   { bg: "#1a0d3b", wave: "#a855f7", glow: "168,85,247" },
    };

    let isReplying = false;

    function getColor() {
      if (isReplying)   return COLORS.replying;
      if (isProcessing) return COLORS.processing;
      if (isSpeaking)   return COLORS.speaking;
      return COLORS.idle;
    }

    // ── Canvas resize ─────────────────────────────────────────────────
    function resizeCanvas() {
      waveCanvas.width  = waveCanvas.offsetWidth  * devicePixelRatio;
      waveCanvas.height = waveCanvas.offsetHeight * devicePixelRatio;
      wCtx.scale(devicePixelRatio, devicePixelRatio);
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    // ── Waveform ──────────────────────────────────────────────────────
    function drawWave(timeData) {
      const W  = waveCanvas.offsetWidth;
      const H  = waveCanvas.offsetHeight;
      const c  = getColor();

      wCtx.clearRect(0, 0, W, H);

      // Fondo con degradado vertical suave
      const bgGrad = wCtx.createLinearGradient(0, 0, 0, H);
      bgGrad.addColorStop(0,   "rgba(0,0,0,0)");
      bgGrad.addColorStop(0.5, `rgba(${c.glow},${0.06 + smoothedVol * 0.12})`);
      bgGrad.addColorStop(1,   "rgba(0,0,0,0)");
      wCtx.fillStyle = bgGrad;
      wCtx.fillRect(0, 0, W, H);

      // Onda espejada (top + bottom) para más presencia visual
      for (const mirror of [1, -1]) {
        const grad = wCtx.createLinearGradient(0, 0, W, 0);
        grad.addColorStop(0,   `rgba(${c.glow},0)`);
        grad.addColorStop(0.15, `rgba(${c.glow},${0.6 + smoothedVol * 0.4})`);
        grad.addColorStop(0.85, `rgba(${c.glow},${0.6 + smoothedVol * 0.4})`);
        grad.addColorStop(1,   `rgba(${c.glow},0)`);

        wCtx.beginPath();
        wCtx.strokeStyle = grad;
        wCtx.lineWidth   = 1.5 + smoothedVol * 1.5;
        wCtx.shadowColor = `rgba(${c.glow},${0.4 + smoothedVol * 0.5})`;
        wCtx.shadowBlur  = 8 + smoothedVol * 16;

        const sliceW = W / timeData.length;
        let x = 0;
        for (let i = 0; i < timeData.length; i++) {
          const v  = timeData[i] / 128.0 - 1;        // -1..1
          const y  = H / 2 + mirror * v * (H * 0.38);
          i === 0 ? wCtx.moveTo(x, y) : wCtx.lineTo(x, y);
          x += sliceW;
        }
        wCtx.stroke();
        wCtx.shadowBlur = 0;
      }
    }

    function drawIdle() {
      const W = waveCanvas.offsetWidth;
      const H = waveCanvas.offsetHeight;
      const c = COLORS.idle;

      wCtx.clearRect(0, 0, W, H);

      // Línea plana con ligero glow
      const grad = wCtx.createLinearGradient(0, 0, W, 0);
      grad.addColorStop(0,    `rgba(${c.glow},0)`);
      grad.addColorStop(0.15, `rgba(${c.glow},0.25)`);
      grad.addColorStop(0.85, `rgba(${c.glow},0.25)`);
      grad.addColorStop(1,    `rgba(${c.glow},0)`);

      wCtx.beginPath();
      wCtx.strokeStyle = grad;
      wCtx.lineWidth   = 1;
      wCtx.shadowColor = `rgba(${c.glow},0.2)`;
      wCtx.shadowBlur  = 6;
      wCtx.moveTo(0, H / 2);
      wCtx.lineTo(W, H / 2);
      wCtx.stroke();
      wCtx.shadowBlur = 0;
    }

    // ── Background glow reactivo ──────────────────────────────────────
    function updateBg() {
      const c        = getColor();
      const opacity  = 0.12 + smoothedVol * 0.25;
      liveBg.style.background = `radial-gradient(ellipse at 50% 80%, ${c.bg}cc ${smoothedVol * 30}%, #0a0a0a 70%)`;
    }

    // ── Visualizer loop ───────────────────────────────────────────────
    let replyAnalyser = null;

    function startVisualizer(stream) {
      micCtx   = new AudioContext();
      const src = micCtx.createMediaStreamSource(stream);
      analyser  = micCtx.createAnalyser();
      analyser.fftSize = 1024;
      src.connect(analyser);

      const timeData = new Uint8Array(analyser.fftSize);
      const freqData = new Uint8Array(analyser.frequencyBinCount);

      function tick() {
        // Usar el analyser de respuesta si está activo, si no el del micrófono
        const activeAnalyser = replyAnalyser || analyser;
        activeAnalyser.getByteTimeDomainData(timeData);
        activeAnalyser.getByteFrequencyData(freqData);

        const avg = freqData.slice(2, 14).reduce((a, b) => a + b, 0) / 12;
        smoothedVol += (Math.min(avg / 150, 1) - smoothedVol) * 0.15;

        drawWave(timeData);
        updateBg();

        rafId = requestAnimationFrame(tick);
      }
      tick();
    }

    function stopVisualizer() {
      if (rafId) cancelAnimationFrame(rafId);
      drawIdle();
      liveBg.style.background = "radial-gradient(ellipse at 50% 70%, #0d1f4a 0%, #0a0a0a 70%)";
      if (micCtx) { micCtx.close(); micCtx = null; }
    }

    // ── Tabs ──────────────────────────────────────────────────────────
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(`tab-${btn.dataset.tab}`).classList.add("active");
        if (btn.dataset.tab === "live") resizeCanvas();
      });
    });

    // ── UI helpers ────────────────────────────────────────────────────
    function appendMsg(role, text) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = text;
      chatLog.appendChild(div);
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function setStatus(text) {
      statusText.textContent = text;
      liveLabel.textContent  = text.toLowerCase();
    }

    function setBtnState(state) {
      toggleBtn.className = state;
      isSpeaking = state === "speaking";
      const labels = { idle: "Iniciar", active: "Escuchando", speaking: "Hablando", processing: "Procesando", replying: "Respondiendo" };
      btnLabel.textContent = labels[state] || "Iniciar";
    }

    // ── Audio utils ───────────────────────────────────────────────────
    const hexDecode = (hex) => hex
      ? new TextDecoder().decode(new Uint8Array(hex.match(/.{1,2}/g).map(b => parseInt(b, 16))))
      : null;

    function encodeWav(samples, sr) {
      const buf  = new ArrayBuffer(44 + samples.length * 2);
      const view = new DataView(buf);
      const s    = (o, v) => { for (let i = 0; i < v.length; i++) view.setUint8(o + i, v.charCodeAt(i)); };
      const pcm  = new Int16Array(samples.length);
      for (let i = 0; i < samples.length; i++) pcm[i] = Math.max(-1, Math.min(1, samples[i])) * 0x7fff;
      s(0,"RIFF"); view.setUint32(4,36+pcm.byteLength,true); s(8,"WAVE"); s(12,"fmt ");
      view.setUint32(16,16,true); view.setUint16(20,1,true); view.setUint16(22,1,true);
      view.setUint32(24,sr,true); view.setUint32(28,sr*2,true);
      view.setUint16(32,2,true); view.setUint16(34,16,true);
      s(36,"data"); view.setUint32(40,pcm.byteLength,true);
      new Int16Array(buf,44).set(pcm);
      return buf;
    }

    async function sendAudio(samples, sr) {
      const form = new FormData();
      form.append("audio", new Blob([encodeWav(samples, sr)], { type:"audio/wav" }), "speech.wav");
      const res = await fetch(ORCHESTRATOR_URL, { method:"POST", body:form });
      if (!res.ok) throw new Error(`Error ${res.status}: ${await res.text()}`);
      return res;
    }

    async function playAudio(response) {
      const actx = micCtx || new AudioContext();
      const src  = actx.createBufferSource();
      src.buffer = await actx.decodeAudioData(await response.arrayBuffer());

      // Conectar al visualizador durante la reproducción
      replyAnalyser = actx.createAnalyser();
      replyAnalyser.fftSize = 1024;
      src.connect(replyAnalyser);
      src.connect(actx.destination);

      isReplying = true;
      setBtnState("replying");
      setStatus("Respondiendo...");

      return new Promise(resolve => {
        src.onended = () => {
          replyAnalyser = null;
          isReplying    = false;
          resolve();
        };
        src.start();
      });
    }

    // ── VAD ───────────────────────────────────────────────────────────
    async function initVAD() {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      startVisualizer(stream);

      vadInstance = await vad.MicVAD.new({
        stream,
        onSpeechStart: () => {
          if (isProcessing) return;
          setBtnState("speaking");
          setStatus("Te escucho...");
        },
        onSpeechEnd: async (audio) => {
          if (isProcessing) return;
          isProcessing = true;
          setBtnState("processing");
          setStatus("Pensando...");

          try {
            const res        = await sendAudio(audio, 16000);
            const transcript = hexDecode(res.headers.get("X-Transcript"));
            const replyText  = hexDecode(res.headers.get("X-Reply-Text"));

            if (transcript) appendMsg("user", transcript);
            if (replyText)  appendMsg("assistant", replyText);

            setStatus("Respondiendo...");
            await playAudio(res);
          } catch (e) {
            appendMsg("error", `Error: ${e.message}`);
            console.error(e);
          } finally {
            isProcessing = false;
            setBtnState("active");
            setStatus("Escuchando...");
          }
        },
      });
    }

    // ── Botón ─────────────────────────────────────────────────────────
    drawIdle();

    toggleBtn.addEventListener("click", async () => {
      if (isProcessing) return;

      if (!isActive) {
        try {
          setStatus("Iniciando...");
          if (!vadInstance) await initVAD();
          vadInstance.start();
          isActive = true;
          setBtnState("active");
          setStatus("Escuchando...");
        } catch (e) {
          setStatus("Sin acceso al micrófono");
          console.error(e);
        }
      } else {
        vadInstance.pause();
        stopVisualizer();
        isActive = false;
        setBtnState("idle");
        setStatus("Pulsa para comenzar");
      }
    });
  </script>
</body>
</html>
